<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Тест для учеников</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1e293b;
            --card: rgba(255, 255, 255, 0.14);
            --line: rgba(255, 255, 255, 0.18);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --accent: #8b5cf6;
            --accent2: #06b6d4;
            --success: #22c55e;
            --danger: #ef4444;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.45), transparent 35%),
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.35), transparent 30%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            padding: 24px;
        }
        .shell { max-width: 980px; margin: 0 auto; }
        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header { padding: 28px 30px 18px; border-bottom: 1px solid var(--line); }
        .badge {
            display: inline-block; padding: 8px 14px; border-radius: 999px;
            background: rgba(255,255,255,0.12); color: var(--muted); font-size: 13px; margin-bottom: 14px;
        }
        h1 { margin: 0 0 10px; font-size: 34px; line-height: 1.1; }
        .subtitle { margin: 0; color: var(--muted); font-size: 17px; line-height: 1.5; }
        .content { padding: 28px 30px 30px; }
        .question {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 22px;
            margin-bottom: 22px;
        }
        .question-title { margin: 0 0 8px; font-size: 24px; }
        .options {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 18px;
        }
        .option { position: relative; }
        .option input { position: absolute; opacity: 0; pointer-events: none; }
        .option label {
            display: flex; gap: 14px; align-items: center; width: 100%; min-height: 86px;
            padding: 18px 18px; border-radius: 20px; cursor: pointer; background: rgba(255,255,255,0.08);
            border: 1px solid var(--line);
            transition: transform .2s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
        }
        .option label:hover {
            transform: translateY(-2px); border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.12);
        }
        .option input:checked + label {
            border-color: rgba(139, 92, 246, 0.9);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.28), rgba(6, 182, 212, 0.18));
            box-shadow: 0 10px 28px rgba(139, 92, 246, 0.22);
        }
        .letter {
            width: 42px; height: 42px; border-radius: 14px; flex: 0 0 42px; display: flex;
            align-items: center; justify-content: center; font-weight: bold; background: rgba(255,255,255,0.14);
        }
        .option-text { font-size: 17px; line-height: 1.4; }
        .actions {
            display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-top: 28px; flex-wrap: wrap;
        }
        .btn {
            border: 0; border-radius: 16px; padding: 15px 22px; font-size: 16px; font-weight: bold; cursor: pointer;
            color: white; background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 12px 30px rgba(6, 182, 212, 0.22);
        }
        .status { min-height: 24px; font-size: 15px; color: var(--muted); }
        .status.success { color: #bbf7d0; }
        .status.error { color: #fecaca; }
        @media (max-width: 760px) {
            h1 { font-size: 28px; }
            .options { grid-template-columns: 1fr; }
            .card-header, .content { padding: 22px; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="card">
        <div class="card-header">
            <div class="badge">Открытый урок · Тест</div>
            <h1>Ответьте на вопросы</h1>
            <p class="subtitle">В каждом вопросе только один правильный вариант ответа.</p>
        </div>

        <div class="content">
            <div class="question" th:each="question, stat : ${questions}">
                <h2 class="question-title" th:text="'Вопрос ' + (${stat.index} + 1)"></h2>
                <div style="font-size:18px; line-height:1.5;" th:text="${question.text}"></div>

                <div class="options">
                    <div class="option" th:each="option, optStat : ${question.options}">
                        <input type="radio"
                               th:id="${question.id + '_' + optStat.index}"
                               th:name="${question.id}"
                               th:value="${option}">
                        <label th:for="${question.id + '_' + optStat.index}">
                            <div class="letter" th:text="${#strings.arraySplit('А,Б,В,Г', ',')[optStat.index]}"></div>
                            <div class="option-text" th:text="${option}"></div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">Отправить ответы</button>
                <div id="message" class="status">Выберите по одному варианту в каждом вопросе.</div>
            </div>
        </div>
    </div>
</div>

<script>
    async function submitQuiz() {
        const submitBtn = document.getElementById('submitBtn');
        const message = document.getElementById('message');

        const questionNames = [...new Set([...document.querySelectorAll('input[type="radio"]')].map(r => r.name))];
        const answers = {};

        for (const name of questionNames) {
            const selected = document.querySelector(`input[name="${name}"]:checked`);
            if (!selected) {
                message.textContent = 'Нужно ответить на все вопросы.';
                message.className = 'status error';
                return;
            }
            answers[name] = selected.value;
        }

        submitBtn.disabled = true;
        message.textContent = 'Отправка ответов...';
        message.className = 'status';

        try {
            const response = await fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ answers: answers })
            });

            const text = await response.text();
            message.textContent = text;
            message.className = 'status success';

            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
        } catch (e) {
            message.textContent = 'Не удалось отправить ответы.';
            message.className = 'status error';
            submitBtn.disabled = false;
        }
    }
</script>
</body>
</html>
