<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель учителя</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b1120;
            --panel: rgba(15, 23, 42, 0.82);
            --panel2: rgba(30, 41, 59, 0.82);
            --line: rgba(148, 163, 184, 0.18);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --accent: #8b5cf6;
            --accent2: #06b6d4;
            --green: #22c55e;
            --shadow: 0 18px 45px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; font-family: Arial, sans-serif; color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.20), transparent 30%),
                radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.18), transparent 35%),
                linear-gradient(135deg, #020617, var(--bg));
            padding: 28px;
        }
        .wrap { max-width: 1280px; margin: 0 auto; }
        .topbar { display:flex; justify-content:space-between; gap:16px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
        h1 { margin:0; font-size:34px; }
        .subtitle { margin-top:8px; color:var(--muted); font-size:16px; }
        .btn {
            border:0; border-radius:16px; padding:14px 18px; color:white; font-weight:bold; cursor:pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 12px 28px rgba(6, 182, 212, 0.2);
        }
        .summary {
            display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:20px;
        }
        .panel {
            background: linear-gradient(180deg, var(--panel), var(--panel2));
            border: 1px solid var(--line); border-radius: 26px; box-shadow: var(--shadow);
            overflow:hidden;
        }
        .panel-head { padding:20px 22px 10px; }
        .panel-body { padding:0 22px 22px; }
        .metric-card {
            border: 1px solid var(--line); background: rgba(255,255,255,0.04); border-radius: 22px; padding: 18px;
            height: 100%;
        }
        .metric-label { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
        .metric-value { font-size: 34px; font-weight: bold; }
        .live { display:inline-flex; align-items:center; gap:8px; margin-top:10px; color:#bbf7d0; font-size:14px; }
        .live-dot { width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 12px rgba(34,197,94,.9); }
        .questions-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
        .chart-box { padding: 4px 22px 22px; height: 360px; }
        .correct-badge {
            display:inline-block; margin-top:6px; padding:8px 12px; border-radius:999px;
            background: rgba(34,197,94,0.16); color:#bbf7d0; font-size:14px;
        }
        .empty { color: var(--muted); padding: 6px 0 16px; }
        @media (max-width: 1000px) {
            .summary { grid-template-columns: 1fr; }
            .questions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>Программируемое реле ОВЕН ПР200: устройство и эксплуатация</h1>
            <div class="subtitle"> </div>
        </div>
        <button class="btn" onclick="clearStats()">Очистить статистику</button>
    </div>

    <div class="summary">
        <div class="panel"><div class="panel-body" style="padding-top:22px;">
            <div class="metric-card">
                <div class="metric-label">Количество отправленных тестов</div>
                <div class="metric-value" id="totalSubmissions">0</div>
                <div class="live"><span class="live-dot"></span><span>Обновление каждые 2 секунды</span></div>
            </div>
        </div></div>

        <div class="panel"><div class="panel-body" style="padding-top:22px;">
            <div class="metric-card">
                <div class="metric-label">Всего вопросов в тесте</div>
                <div class="metric-value" id="totalQuestions">0</div>
            </div>
        </div></div>

        <div class="panel"><div class="panel-body" style="padding-top:22px;">
            <div class="metric-card">
                <div class="metric-label">Правильных ответов получено</div>
                <div class="metric-value" id="totalCorrectAnswers">0</div>
            </div>
        </div></div>
    </div>

    <div id="questionsContainer" class="questions-grid"></div>
    <div id="emptyState" class="empty">Пока нет данных.</div>
</div>

<script>
    const chartInstances = {};

    function palette(index) {
        const sets = [
            ['rgba(139, 92, 246, 0.85)','rgba(6, 182, 212, 0.85)','rgba(34, 197, 94, 0.85)','rgba(249, 115, 22, 0.85)'],
            ['rgba(59, 130, 246, 0.85)','rgba(236, 72, 153, 0.85)','rgba(132, 204, 22, 0.85)','rgba(245, 158, 11, 0.85)'],
            ['rgba(16, 185, 129, 0.85)','rgba(168, 85, 247, 0.85)','rgba(244, 63, 94, 0.85)','rgba(14, 165, 233, 0.85)']
        ];
        return sets[index % sets.length];
    }

    function ensureQuestionCard(question, index) {
        const container = document.getElementById('questionsContainer');
        let card = document.getElementById('card-' + question.id);

        if (!card) {
            card = document.createElement('div');
            card.className = 'panel';
            card.id = 'card-' + question.id;
            card.innerHTML = `
                <div class="panel-head">
                    <h2 style="margin:0 0 8px;">Вопрос ${index + 1}</h2>
                    <div style="color:#f8fafc; line-height:1.5;">${question.text}</div>
                    <div class="correct-badge">Правильный ответ: ${question.correctAnswer}</div>
                </div>
                <div class="chart-box">
                    <canvas id="chart-${question.id}"></canvas>
                </div>
            `;
            container.appendChild(card);

            const ctx = document.getElementById('chart-' + question.id);
            chartInstances[question.id] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: question.labels,
                    datasets: [{
                        label: 'Количество ответов',
                        data: question.values,
                        borderRadius: 14,
                        backgroundColor: palette(index),
                        borderWidth: 0
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#f8fafc' } }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#e2e8f0', font: { size: 11 } },
                            grid: { display: false }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0, color: '#e2e8f0' },
                            grid: { color: 'rgba(148, 163, 184, 0.18)' }
                        }
                    }
                }
            });
        } else {
            card.querySelector('.correct-badge').textContent = 'Правильный ответ: ' + question.correctAnswer;
        }
    }

    async function loadStats() {
        const response = await fetch('/stats');
        const data = await response.json();

        document.getElementById('totalSubmissions').innerText = data.totalSubmissions;
        document.getElementById('totalQuestions').innerText = data.totalQuestions;
        document.getElementById('totalCorrectAnswers').innerText = data.totalCorrectAnswers;

        const empty = document.getElementById('emptyState');
        empty.style.display = data.questions.length ? 'none' : 'block';

        data.questions.forEach((question, index) => {
            ensureQuestionCard(question, index);
            const chart = chartInstances[question.id];
            chart.data.labels = question.labels;
            chart.data.datasets[0].data = question.values;
            chart.update();
        });
    }

    async function clearStats() {
        await fetch('/clear', { method: 'POST' });
        loadStats();
    }

    loadStats();
    setInterval(loadStats, 2000);
</script>
</body>
</html>
